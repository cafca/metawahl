repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff
        args: [--fix]
        files: ^api/
      - id: ruff-format
        files: ^api/
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        files: ^api/app/
        additional_dependencies:
          - Flask>=3.0
          - Flask-SQLAlchemy>=3.1
          - SQLAlchemy>=2.0
          - types-requests
          - types-python-dateutil
