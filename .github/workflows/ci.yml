name: CI

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read
  packages: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v5
        with:
          version: "0.5.14"
      - run: uv sync --frozen
      - run: uv run ruff check
      - run: uv run mypy app

  client:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: yarn
          cache-dependency-path: client/yarn.lock
      - run: yarn install --frozen-lockfile --network-timeout 600000
      - run: yarn test --watchAll=false
        env:
          CI: "true"
      - run: yarn build
        env:
          REACT_APP_API_ROOT: https://api.metawahl.de/v3

  api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: metawahl
          POSTGRES_PASSWORD: metawahl
          POSTGRES_DB: metawahl
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U metawahl"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    env:
      METAWAHL_CONFIG: test.conf.py
      METAWAHL_DB_URL: postgresql://metawahl:metawahl@localhost:5432/metawahl
      CACHE_REDIS_URL: redis://localhost:6379/0
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v5
        with:
          version: "0.5.14"
      - run: uv sync --frozen
      - name: Apply migrations
        run: uv run alembic upgrade head
      - name: Check for migration drift
        run: uv run alembic check
      - name: Run pytest
        run: uv run pytest -v

  release:
    needs: [lint, client, api]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    uses: ./.github/workflows/release.yml
    secrets: inherit
    permissions:
      contents: read
      packages: write
