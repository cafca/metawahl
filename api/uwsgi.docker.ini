[uwsgi]
chdir = /app/api/app
module = wsgi

master = true
processes = 5
threads = 2

# Plain HTTP socket. nginx in front uses `proxy_pass http://...`, not uwsgi_pass.
# Simpler to healthcheck and curl-test; perf delta is irrelevant at this scale.
http-socket = 0.0.0.0:3001

die-on-term = true
vacuum = true

# uwsgi logs to stderr by default; Docker captures it via `docker logs`.
log-master = true
log-format = [uwsgi] %(addr) - %(method) %(uri) -> %(status) (%(msecs)ms)

# Secrets & runtime config come from the environment (compose `.env` / env_file).
# METAWAHL_CONFIG, METAWAHL_SECRET, METAWAHL_ADMIN_KEY, METAWAHL_DB_URL,
# CACHE_MEMCACHED_SERVERS, METAWAHL_API_LOGFILE are all read by the app.
